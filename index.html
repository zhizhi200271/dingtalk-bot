<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态漫制作系统·HoloLake</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">🎬动态漫制作系统</div>
        <div class="header-actions">
            <button class="btn btn-primary">新建项目</button>
            <button class="btn">打开项目</button>
            <button class="btn">导出</button>
        </div>
    </header>
    
    <main class="workspace">
        <aside class="panel panel-assets">
            <div class="panel-header">📁素材库</div>
            <div class="panel-body">
                <div class="asset-category">
                    <h4>角色</h4>
                    <div class="asset-grid">
                        <div class="asset-item">👤角色A</div>
                        <div class="asset-item">👤角色B</div>
                        <div class="asset-item">👤角色C</div>
                    </div>
                </div>
                <div class="asset-category">
                    <h4>背景</h4>
                    <div class="asset-grid">
                        <div class="asset-item">🏙️城市</div>
                        <div class="asset-item">🌲森林</div>
                        <div class="asset-item">🏠室内</div>
                    </div>
                </div>
                <div class="asset-category">
                    <h4>特效</h4>
                    <div class="asset-grid">
                        <div class="asset-item">💥爆炸</div>
                        <div class="asset-item">✨闪光</div>
                        <div class="asset-item">💨烟雾</div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="panel panel-preview">
            <div class="panel-header">👁️预览区</div>
            <div class="panel-body preview-canvas">
                <div class="canvas-placeholder">
                    <p>🎬</p>
                    <p>拖入素材开始创作</p>
                    <p class="canvas-size">1920 × 1080</p>
                </div>
            </div>
        </section>

        <aside class="panel panel-layers">
            <div class="panel-header">📚图层面板</div>
            <div class="panel-body">
                <div class="layer-item active">
                    <span class="layer-visibility">👁️</span>
                    <span class="layer-name">背景层</span>
                    <span class="layer-lock">🔓</span>
                </div>
                <div class="layer-item">
                    <span class="layer-visibility">👁️</span>
                    <span class="layer-name">角色层</span>
                    <span class="layer-lock">🔓</span>
                </div>
                <div class="layer-item">
                    <span class="layer-visibility">👁️</span>
                    <span class="layer-name">特效层</span>
                    <span class="layer-lock">🔓</span>
                </div>
                <div class="layer-item">
                    <span class="layer-visibility">👁️</span>
                    <span class="layer-name">文字层</span>
                    <span class="layer-lock">🔓</span>
                </div>
                <div class="layer-actions">
                    <button class="btn-small">+新图层</button>
                    <button class="btn-small">🗑️删除</button>
                </div>
            </div>
        </aside>
    </main>

    <footer class="panel panel-timeline">
        <div class="panel-header">
            <span>⏱️时间轴</span>
            <div class="timeline-controls">
                <button class="btn-small">⏮</button>
                <button class="btn-small btn-play">▶️</button>
                <button class="btn-small">⏭</button>
                <span class="timeline-time">00:00 / 00:30</span>
            </div>
        </div>
        <div class="panel-body timeline-tracks">
            <div class="track">
                <div class="track-label">背景</div>
                <div class="track-bar">
                    <div class="track-clip" style="width: 100%"></div>
                </div>
            </div>
            <div class="track">
                <div class="track-label">角色</div>
                <div class="track-bar">
                    <div class="track-clip" style="width: 60%; margin-left: 10%"></div>
                </div>
            </div>
            <div class="track">
                <div class="track-label">特效</div>
                <div class="track-bar">
                    <div class="track-clip" style="width: 20%; margin-left: 40%"></div>
                </div>
            </div>
            <div class="track">
                <div class="track-label">文字</div>
                <div class="track-bar">
                    <div class="track-clip" style="width: 30%; margin-left: 20%"></div>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
